<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>أهلية التسجيل للطلاب المستجدين للعام الدراسي 1448هـ</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3135/3135810.png">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #e3f2fd;
            --secondary-green: #e8f5e9;
            --accent-blue: #1976d2;
            --accent-green: #2e7d32;
            --text-main: #37474f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-green));
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { color: var(--accent-blue); font-size: 1.5rem; margin-bottom: 20px; }

        .section {
            background: #fff;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }

        h2 { font-size: 0.95rem; color: var(--accent-green); margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            justify-content: center;
        }

        select {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
            font-size: 0.85rem;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent-blue);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button.btn-green { background-color: var(--accent-green); }

        .result-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #f1f8ff;
            display: none;
            text-align: right;
            border-right: 5px solid var(--accent-blue);
        }

        .grade-highlight {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
            border-right: 5px solid #2e7d32;
        }

        .dept-info { margin-top: 25px; font-weight: bold; color: var(--accent-blue); font-size: 0.9rem; }
        footer { margin-top: 5px; font-size: 0.7rem; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-user-graduate"></i> أهلية التسجيل للطلاب المستجدين للعام الدراسي 1448هـ</h1>

    <div class="section">
        <h2><i class="fas fa-calendar-alt"></i> محول التاريخ الهجري إلى ميلادي</h2>
        <div class="input-row">
            <select id="hDay"></select>
            <select id="hMonth"></select>
            <select id="hYear"></select>
        </div>
        <button onclick="convertToGregorian()"><i class="fas fa-exchange-alt"></i> تحويل إلى ميلادي</button>
        <div id="convResult" class="result-box"></div>
    </div>

    <div class="section">
        <h2><i class="fas fa-calculator"></i> حساب العمر والصف المستحق (ميلادي)</h2>
        <div class="input-row">
            <select id="gDayCalc"></select>
            <select id="gMonthCalc"></select>
            <select id="gYearCalc"></select>
        </div>
        <button class="btn-green" onclick="checkEligibility()"><i class="fas fa-search-plus"></i> تحليل العمر والاستحقاق</button>
        
        <div id="ageDetailResult" class="result-box">
            <div id="ageFull"></div>
            <div id="gradeFull" class="grade-highlight"></div>
        </div>
    </div>

    <div class="dept-info">الإدارة العامة للتعليم بمحافظة جدة - إدارة التطوير والتحول - قسم قياس الأداء المؤسسي</div>
    <footer></footer>
</div>

<script>
    window.onload = function() {
        const hDay = document.getElementById('hDay');
        const hMonth = document.getElementById('hMonth');
        const hYear = document.getElementById('hYear');
        const gDay = document.getElementById('gDayCalc');
        const gMonth = document.getElementById('gMonthCalc');
        const gYear = document.getElementById('gYearCalc');

        const monthsH = ["محرم","صفر","ربيع الأول","ربيع الثاني","جمادى الأولى","جمادى الآخرة","رجب","شعبان","رمضان","شوال","ذو القعدة","ذو الحجة"];
        const monthsG = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

        for(let i=1; i<=31; i++) {
            hDay.innerHTML += i <= 30 ? `<option value="${i}">${i}</option>` : "";
            gDay.innerHTML += `<option value="${i}">${i}</option>`;
        }
        monthsH.forEach((m, i) => hMonth.innerHTML += `<option value="${i+1}">${m}</option>`);
        monthsG.forEach((m, i) => gMonth.innerHTML += `<option value="${i+1}">${m}</option>`);
        for(let i=1460; i>=1390; i--) hYear.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=2030; i>=2010; i--) gYear.innerHTML += `<option value="${i}">${i}</option>`;
    };

   function checkEligibility() {
    const d = parseInt(document.getElementById('gDayCalc').value);
    const m = parseInt(document.getElementById('gMonthCalc').value);
    const y = parseInt(document.getElementById('gYearCalc').value);
    
    const birthDate = new Date(y, m - 1, d);
    
    // التواريخ المعيارية
    const limitFullSix = new Date(2020, 7, 24);      
    const limitNinetyDays = new Date(2020, 10, 22);   
    const limitKG3 = new Date(2021, 7, 24);          
    const limitKG2 = new Date(2022, 7, 24);          
    const limitKG1 = new Date(2023, 7, 24);          

    let ageMessage = "";
    let gradeMessage = "";
    let showGrade = true; // متغير للتحكم في ظهور سطر الاستحقاق

    if (birthDate <= limitFullSix) {
        ageMessage = "أكمل الطفل (6) سنوات.";
        gradeMessage = "الاستحقاق: تسجيل مباشر في الصف الأول الابتدائي.";
    } 
    else if (birthDate > limitFullSix && birthDate <= limitNinetyDays) {
        ageMessage = "أقل من (6) سنوات بـ (90) يوماً.";
        gradeMessage = "الاستحقاق: تسجيل في الصف الأول الابتدائي (قبول مشروط).";
    } 
    else if (birthDate > limitNinetyDays && birthDate <= limitKG3) {
        ageMessage = "الفئة العمرية للمستوى الثالث.";
        gradeMessage = "الاستحقاق: رياض الأطفال - المستوى الثالث (تمهيدي).";
    } 
    else if (birthDate > limitKG3 && birthDate <= limitKG2) {
        ageMessage = "الفئة العمرية للمستوى الثاني.";
        gradeMessage = "الاستحقاق: رياض الأطفال - المستوى الثاني (KG2).";
    } 
    else if (birthDate > limitKG2 && birthDate <= limitKG1) {
        ageMessage = "الفئة العمرية للمستوى الأول.";
        gradeMessage = "الاستحقاق: رياض الأطفال - المستوى الأول (KG1).";
    } 
    else {
        ageMessage = "العمر دون السن النظامي للقبول.";
        showGrade = false; // تفعيل إخفاء الاستحقاق
    }

    // عرض النتائج
    document.getElementById('ageDetailResult').style.display = "block";
    document.getElementById('ageFull').innerHTML = `<i class="fas fa-calendar-check"></i> الحالة: <strong>${ageMessage}</strong>`;
    
    const gradeDiv = document.getElementById('gradeFull');
    if(showGrade) {
        gradeDiv.style.display = "block";
        gradeDiv.innerHTML = `<i class="fas fa-graduation-cap"></i> ${gradeMessage}`;
    } else {
        gradeDiv.style.display = "none"; // إخفاء المربع تماماً
    }
}
</script>
</body>
</html>

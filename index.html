<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أهلية التسجيل للطلاب المستجدين 1448هـ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🎓</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-page: #c2c1c1;          
            --brand-color: #69cee3;      
            --title-main: #351375;       
            --text-normal: #15445a;      
            --text-dept: #218caa;        
            --accent-green: #2e7d32;
        }

        body {
            font-family: "Helvetica Neue W23 for SKY", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-normal);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        h1 { 
            color: var(--title-main); 
            font-size: 1.4rem; 
            margin-bottom: 25px; 
            line-height: 1.6;
            font-weight: bold;
        }

        /* تنسيق القسم القابل للطي */
        details.section-collapsible {
            background-color: var(--brand-color);
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid var(--brand-color);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            color: var(--title-main);
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary::-webkit-details-marker { display: none; }

        summary:after {
            content: "\f0d7";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            transition: transform 0.3s;
        }

        details[open] summary:after {
            transform: rotate(180deg);
        }

        .section-content {
            padding: 0 20px 20px 20px;
        }

        .section {
            background-color: var(--brand-color); 
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid var(--brand-color); 
        }

        h2 { 
            font-size: 1rem; 
            color: var(--title-main); 
            margin-bottom: 18px; 
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(21, 68, 90, 0.2);
            font-weight: bold;
        }

        .dropdown-label {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-normal);
        }

        .input-item {
            flex: 1;
            min-width: 80px;
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ffffff;
            border-radius: 6px;
            background: #fff;
            font-size: 0.9rem;
            color: var(--text-normal);
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--title-main);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        button.btn-check { 
            background-color: var(--text-normal); 
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: #fff;
            display: none;
            text-align: right;
            border-right: 5px solid var(--title-main);
            font-size: 0.95rem;
        }

        .registration-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: white;
            color: var(--text-normal);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid var(--text-normal);
            transition: 0.3s;
        }

        .registration-link:hover { 
            background-color: var(--text-normal); 
            color: #fff; 
        }

        hr { border: 0; border-top: 1px solid #ddd; margin: 30px 0 20px 0; }

        .dept-info { 
            font-weight: bold; 
            color: var(--text-dept); 
            font-size: 0.85rem; 
            line-height: 1.8;
        }

        footer { margin-top: 10px; font-size: 0.75rem; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-graduation-cap"></i> أهلية التسجيل للطلاب المستجدين للعام الدراسي 1448هـ</h1>

    <details class="section-collapsible">
        <summary>
            <span><i class="fas fa-calendar-alt"></i> محول التاريخ الهجري إلى ميلادي</span>
        </summary>
        <div class="section-content">
            <div class="input-row">
                <div class="input-item">
                    <span class="dropdown-label">اليوم</span>
                    <select id="hDay"></select>
                </div>
                <div class="input-item">
                    <span class="dropdown-label">الشهر</span>
                    <select id="hMonth"></select>
                </div>
                <div class="input-item">
                    <span class="dropdown-label">السنة</span>
                    <select id="hYear"></select>
                </div>
            </div>
            <button onclick="convertToGregorian()">تحويل إلى ميلادي <i class="fas fa-exchange-alt"></i></button>
            <div id="convResult" class="result-box"></div>
        </div>
    </details>

    <div class="section">
        <h2><i class="fas fa-calculator"></i> حساب الأهلية (ميلادي)</h2>
        <div class="input-row">
            <div class="input-item">
                <span class="dropdown-label">اليوم</span>
                <select id="gDayCalc"></select>
            </div>
            <div class="input-item">
                <span class="dropdown-label">الشهر</span>
                <select id="gMonthCalc"></select>
            </div>
            <div class="input-item">
                <span class="dropdown-label">السنة</span>
                <select id="gYearCalc"></select>
            </div>
        </div>
        <button class="btn-check" onclick="checkEligibility()"><i class="fas fa-search-plus"></i> تحليل الأهلية النظامية</button>
        
        <div id="ageDetailResult" class="result-box">
            <div id="ageFull"></div>
            <div id="gradeFull" style="color: var(--accent-green); margin-top: 8px; font-weight: bold;"></div>
        </div>

        <a href="https://edugate.moe.gov.sa/services" target="_blank" class="registration-link">
             رابط التسجيل <i class="fas fa-external-link-alt"></i>
        </a>
    </div>

    <hr>

    <div class="dept-info">
        الإدارة العامة للتعليم بمحافظة جدة<br>
        إدارة التطوير والتحول<br>
        قسم قياس الأداء المؤسسي
    </div>
    <footer></footer>
</div>

<script>
    window.onload = function() {
        const hDay = document.getElementById('hDay');
        const hMonth = document.getElementById('hMonth');
        const hYear = document.getElementById('hYear');
        const gDay = document.getElementById('gDayCalc');
        const gMonth = document.getElementById('gMonthCalc');
        const gYear = document.getElementById('gYearCalc');

        for(let i=1; i<=31; i++) {
            hDay.innerHTML += i <= 30 ? `<option value="${i}">${i}</option>` : "";
            gDay.innerHTML += `<option value="${i}">${i}</option>`;
        }
        
        const monthsH = ["محرم","صفر","ربيع الأول","ربيع الثاني","جمادى الأولى","جمادى الآخرة","رجب","شعبان","رمضان","شوال","ذو القعدة","ذو الحجة"];
        const monthsG = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
        
        monthsH.forEach((m, i) => hMonth.innerHTML += `<option value="${i+1}">${m}</option>`);
        monthsG.forEach((m, i) => gMonth.innerHTML += `<option value="${i+1}">${m}</option>`);
        
        for(let i=1460; i>=1390; i--) hYear.innerHTML += `<option value="${i}">${i}</option>`;
        
        const currentYear = new Date().getFullYear();
        for(let i = currentYear + 10; i >= currentYear - 10; i--) {
            gYearCalc.innerHTML += `<option value="${i}">${i}</option>`;
        }
    };

    function convertToGregorian() {
        const d = parseInt(document.getElementById('hDay').value);
        const m = parseInt(document.getElementById('hMonth').value);
        const y = parseInt(document.getElementById('hYear').value);
        const resDiv = document.getElementById('convResult');

        let jd = Math.floor((11 * y + 3) / 30) + 354 * y + 30 * m - Math.floor((m - 1) / 2) + d + 1948440 - 385;
        let l = jd + 68569;
        let n = Math.floor((4 * l) / 146097);
        l = l - Math.floor((146097 * n + 3) / 4);
        let i = Math.floor((4000 * (l + 1)) / 1461001);
        l = l - Math.floor((1461 * i) / 4) + 31;
        let j = Math.floor((80 * l) / 2447);
        let day = l - Math.floor((2447 * j) / 80);
        l = Math.floor(j / 11);
        let month = j + 2 - 12 * l;
        let year = 100 * (n - 49) + i + l;

        resDiv.style.display = "block";
        resDiv.innerHTML = `<i class="fas fa-check-circle"></i> التاريخ الميلادي: <strong>${day} / ${month} / ${year} م</strong>`;
    }

    function checkEligibility() {
        const d = parseInt(document.getElementById('gDayCalc').value);
        const m = parseInt(document.getElementById('gMonthCalc').value);
        const y = parseInt(document.getElementById('gYearCalc').value);
        const birthDate = new Date(y, m - 1, d);
        
        const limitFullSix = new Date(2020, 7, 24);      
        const limitNinetyDays = new Date(2020, 10, 22);   
        const limitKG3 = new Date(2021, 7, 24);          
        const limitKG2 = new Date(2022, 7, 24);          
        const limitKG1 = new Date(2023, 7, 24);          

        let ageMessage = "";
        let gradeMessage = "";
        let showGrade = true;

        if (birthDate <= limitFullSix) {
            ageMessage = "أكمل الطفل (6) سنوات.";
            gradeMessage = "الاستحقاق: تسجيل مباشر في الصف الأول الابتدائي.";
        } 
        else if (birthDate > limitFullSix && birthDate <= limitNinetyDays) {
            ageMessage = "أقل من (6) سنوات بـ (90) يوماً.";
            gradeMessage = "الاستحقاق: تسجيل في الصف الأول الابتدائي (قبول مشروط).";
        } 
        else if (birthDate > limitNinetyDays && birthDate <= limitKG3) {
            ageMessage = "الفئة العمرية للمستوى الثالث.";
            gradeMessage = "الاستحقاق: رياض الأطفال - المستوى الثالث (تمهيدي).";
        } 
        else if (birthDate > limitKG3 && birthDate <= limitKG2) {
            ageMessage = "الفئة العمرية للمستوى الثاني.";
            gradeMessage = "الاستحقاق: رياض الأطفال - المستوى الثاني (KG2).";
        } 
        else if (birthDate > limitKG2 && birthDate <= limitKG1) {
            ageMessage = "الفئة العمرية للمستوى الأول.";
            gradeMessage = "الاستحقاق: رياض الأطفال - المستوى الأول (KG1).";
        } 
        else {
            ageMessage = "العمر دون السن النظامي للقبول.";
            showGrade = false; 
        }

        document.getElementById('ageDetailResult').style.display = "block";
        document.getElementById('ageFull').innerHTML = `الحالة: <strong>${ageMessage}</strong>`;
        
        const gradeDiv = document.getElementById('gradeFull');
        if(showGrade) {
            gradeDiv.style.display = "block";
            gradeDiv.innerHTML = `<i class="fas fa-graduation-cap"></i> ${gradeMessage}`;
        } else {
            gradeDiv.style.display = "none";
        }
    }
</script>
</body>
</html>
